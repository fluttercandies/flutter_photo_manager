name: Publish

on:
  release:
    types: [ published ]
  workflow_dispatch:

# Disable permissions for all of the available permissions
permissions: {}

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@900f2210b1d28bbbd0bd22d17926b9e224e8f231
      - name: Copy on publish
        run: ./copy_on_publish.sh
      - name: Publish
        uses: k-paxian/dart-package-publisher@8fdba1dbf624c712706281a6f91cb50b6bfc2eaf
        with:
          credentialJson: ${{ secrets.CREDENTIAL_JSON }}
          flutter: true
          skipTests: true
          dryRunOnly: false
